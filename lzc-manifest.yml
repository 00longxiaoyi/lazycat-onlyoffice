lzc-sdk-version: "0.1"
name: ONLYOFFICE Docs
package: cloud.lazycat.app.onlyoffice-docs
version: 0.4.0
description: ONLYOFFICE 文档编辑器
license: AGPL-3.0
homepage: https://www.onlyoffice.com/
author: lazycat
min_os_version: 1.3.9
unsupported_platforms:
  - android
  - ios
  - tvos

application:
  subdomain: onlyoffice-docs
  background_task: true
  multi_instance: false
  enable_document_access: true
  public_path:
    - /download
    - /callback
    - /doc
    - /web-apps
    - /hosting
    - /cache
    - /healthcheck
  file_handler:
    mime:
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.ms-powerpoint
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - text/plain
      - text/csv
      - x-lzc-extension/doc
      - x-lzc-extension/docx
      - x-lzc-extension/xls
      - x-lzc-extension/xlsx
      - x-lzc-extension/ppt
      - x-lzc-extension/pptx
      - x-lzc-extension/txt
      - x-lzc-extension/csv
    actions:
      open: /open?url=%u
  routes:
    - /=http://proxy:80/

services:
  proxy:
    image: registry.lazycat.cloud/app-proxy:v0.1.0
    depends_on:
      - web
      - document-server
    setup_script: |
      cat <<'EOF' > /etc/nginx/conf.d/default.conf
      server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        location = /healthcheck {
          proxy_pass http://document-server:80/healthcheck;
        }

        location ^~ /web-apps/ {
          proxy_pass http://document-server:80;
        }

        location ^~ /hosting/ {
          proxy_pass http://document-server:80;
        }

        location ^~ /cache/ {
          proxy_pass http://document-server:80;
        }

        location ^~ /doc/ {
          proxy_pass http://document-server:80;
        }

        location ~ ^/[0-9]+\.[0-9]+\.[0-9]+-[^/]+/ {
          proxy_pass http://document-server:80;
        }

        location / {
          proxy_pass http://web:3000;
        }
      }
      EOF

  web:
    image: registry.lazycat.cloud/longixaoyi/library/node:5a06abb2657c9976
    command: node /lzcapp/pkg/content/dist/server/index.js
    depends_on:
      - document-server
    environment:
      PORT: "3000"
      APP_ORIGIN: https://${LAZYCAT_APP_DOMAIN}
      HOME_ROOT: /lzcapp/document
      STATE_DIR: /lzcapp/var/state
      FRONTEND_DIST: /lzcapp/pkg/content/dist/frontend
      DOCUMENT_SERVER_PUBLIC_ORIGIN: https://${LAZYCAT_APP_DOMAIN}
      DEPLOY_UID: "${LAZYCAT_APP_DEPLOY_UID}"
    binds:
      - /lzcapp/var/state:/lzcapp/var/state

  document-server:
    image: registry.lazycat.cloud/longixaoyi/onlyoffice/documentserver:d0178cfeee7043a2
    environment:
      JWT_ENABLED: "false"
      USE_UNAUTHORIZED_STORAGE: "true"
    setup_script: |
      sed -i 's/"allowPrivateIPAddress"[[:space:]]*:[[:space:]]*false/"allowPrivateIPAddress": true/g' /etc/onlyoffice/documentserver/default.json
      sed -i 's/"allowMetaIPAddress"[[:space:]]*:[[:space:]]*false/"allowMetaIPAddress": true/g' /etc/onlyoffice/documentserver/default.json
    binds:
      - /lzcapp/var/document-server/logs:/var/log/onlyoffice
      - /lzcapp/var/document-server/data:/var/www/onlyoffice/Data
      - /lzcapp/var/document-server/lib:/var/lib/onlyoffice
      - /lzcapp/var/document-server/db:/var/lib/postgresql
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost/healthcheck
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
